<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takahiro Izumikawa — Pianist</title>
<meta name="description" content="Made up in the moment. You don't need to know it — come to be moved.">
<!-- OGP / Twitter Card -->
<meta property="og:title" content="Takahiro Izumikawa">
<meta property="og:description" content="Made up in the moment. You don't need to know it — come to be moved.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://takahiroizumikawa.com/">
<meta property="og:image" content="https://takahiroizumikawa.com/assets/hero.jpg">
<meta name="twitter:card" content="summary_large_image">
<!-- font: Poppins 1書体統一（セリフ・斜体・装飾体禁止） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#161616; --text:#f5f0e8;
  --dim:rgba(245,240,232,.55); --faint:rgba(245,240,232,.32);
  --accent:#db2626; --rule:rgba(245,240,232,.14);
  --font:'Poppins',sans-serif;
  --gutter:clamp(24px,5vw,64px); --max:680px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
body{min-height:100vh;overflow-x:hidden;letter-spacing:.02em}
/* grain overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:5;opacity:.08;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.96 0 0 0 0 0.94 0 0 0 0 0.91 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>")
}

/* ── top nav ── */
nav.top{
  position:relative;z-index:3;
  display:flex;justify-content:space-between;align-items:center;
  padding:clamp(18px,2.6vh,28px) var(--gutter)
}
.wordmark{font-size:13px;letter-spacing:.36em;text-transform:lowercase;color:var(--text);font-weight:500}
/* ── side nav (写真右側・縦積み) ── */
.side-nav{
  position:absolute;right:clamp(48px,7vw,96px);top:clamp(28px,5vh,56px);
  z-index:3;display:flex;flex-direction:column;gap:clamp(14px,2vh,22px);
  text-align:right
}
.side-nav a{
  font-size:14px;letter-spacing:.1em;text-transform:lowercase;
  color:rgba(245,240,232,.7);text-decoration:none;transition:color .4s;
  text-shadow:0 1px 6px rgba(0,0,0,.5)
}
.side-nav a:hover{color:var(--accent)}

/* ── photo band (全面) ── */
.band{position:relative;height:85svh;min-height:400px;overflow:hidden}
.band img{
  width:100%;height:100%;object-fit:cover;
  object-position:center 72%;
  display:block;filter:brightness(.80) contrast(1.06)
}
/* bottom fade: photo → bg (スクロール誘導) */
.band::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(22,22,22,.92) 0%,rgba(22,22,22,0) 10%,rgba(22,22,22,.0) 46%,rgba(22,22,22,.65) 76%,rgba(22,22,22,.98) 100%)
}
.band .name{
  position:absolute;z-index:2;
  left:0;right:0;bottom:clamp(22px,4vh,40px);
  text-align:center;
  font-size:clamp(28px,4.6vw,52px);font-weight:500;letter-spacing:.005em;
  text-shadow:0 1px 10px rgba(0,0,0,.65)
}

/* photo credit（写真右下・旧インラインstyleをクラス化） */
.credit{
  position:absolute;right:clamp(12px,2vw,22px);bottom:clamp(9px,1.6vh,15px);
  z-index:4;margin:0;font-family:'Poppins',sans-serif;
  font-size:9px;font-weight:400;letter-spacing:.1em;
  color:rgba(245,240,232,.3);pointer-events:none
}

/* ── capture block (the star) ── */
.capture{
  max-width:var(--max);margin:0 auto;
  padding:clamp(40px,7vh,72px) var(--gutter) clamp(28px,4vh,40px);
  text-align:center
}
.role{font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:var(--dim);margin-bottom:20px}
.role b{color:var(--accent);font-weight:500}
.statement{
  font-size:clamp(13px,1.4vw,15px);font-weight:300;line-height:1.7;
  color:var(--text);max-width:47ch;margin:0 auto 30px
}
.offer{font-size:13px;color:var(--dim);margin-bottom:14px;text-transform:uppercase;letter-spacing:.14em}
.form{max-width:460px;margin:0 auto;text-align:left}
.email-row{
  display:flex;
  border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);
  margin-bottom:10px
}
.email-row input[type="email"]{
  flex:1;background:transparent;border:0;
  color:var(--text);font-family:var(--font);font-size:15px;
  padding:16px 0;outline:none;min-width:0
}
.email-row input[type="email"]::placeholder{color:var(--faint)}
.lang-btns{display:flex;gap:10px}
.lang-btn{
  flex:1;background:transparent;
  border:1px solid var(--rule);
  color:var(--dim);font-family:var(--font);
  font-weight:400;font-size:12px;letter-spacing:.12em;text-transform:lowercase;
  padding:13px 0;cursor:pointer;transition:border-color .4s,color .4s
}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.note{margin-top:12px;font-size:11px;color:var(--faint)}
/* form error / submitting */
.form-error{margin:12px 0 0;font-size:12px;letter-spacing:.04em;color:#c46b6b}
.form-error:empty{display:none}
.lang-btn:disabled{opacity:.45;cursor:default}
.lang-btn:disabled:hover{border-color:var(--rule);color:var(--dim)}

/* ── TOC row ── */
nav.toc{
  display:flex;justify-content:center;gap:clamp(20px,3vw,40px);
  padding:clamp(20px,3vh,30px) var(--gutter);
  border-top:1px solid var(--rule);
  flex-wrap:wrap
}
nav.toc a{
  font-size:11px;letter-spacing:.3em;text-transform:lowercase;
  color:var(--dim);text-decoration:none;transition:color .4s
}
nav.toc a:hover{color:var(--accent)}

/* ── footer ── */
footer{
  display:flex;justify-content:center;gap:clamp(18px,2.4vw,32px);
  padding:clamp(16px,2.5vh,24px) var(--gutter) clamp(28px,4vh,40px);
  border-top:1px solid var(--rule);
  flex-wrap:wrap
}
footer a{
  font-size:10px;letter-spacing:.28em;text-transform:lowercase;
  color:var(--faint);text-decoration:none;transition:color .4s
}
footer a:hover{color:var(--dim)}

/* ── mobile: 写真は元サイズ(85svh)のまま、登録フォームを写真下部にオーバーレイして同一画面に収める ── */
@media (max-width:640px){
  .band .name{display:none} /* 上部wordmarkと重複＋フォームと衝突するため非表示 */
  .band img{object-position:center 82%} /* ピアノ(画像最下部)を見せるため下寄りクロップ */
  .credit{bottom:17svh} /* クレジットをPIANISTとstatementの間の高さへ（フォーム上被り回避・右位置は維持） */
  .capture{
    position:relative;z-index:2;
    margin-top:-28svh; /* 写真下部のピアノを見せつつ登録を重ねる */
    background:linear-gradient(to top,var(--bg) 60%,rgba(22,22,22,0)) /* 下地を暗くして可読性確保・上へフェード */
  }
}
</style>
</head>
<body>

<nav class="top">
  <div class="wordmark">takahiro izumikawa</div>
</nav>

<section class="band">
  <img
    src="assets/hero.jpg"
    alt="Takahiro Izumikawa performing live at the piano"
    loading="eager"
    fetchpriority="high"
  >
  <h1 class="name">Takahiro Izumikawa</h1>
  <nav class="side-nav">
    <a href="about.html">about</a>
    <a href="music.html">music</a>
    <a href="shows.html">shows</a>
    <a href="contact.html">contact</a>
    <a href="https://mubo.taka808.com/about/" target="_blank" rel="noopener">学ぶ ↗&#xFE0E;</a>
  </nav>
  <p class="credit">photo · Stephanie Han</p>
</section>

<section class="capture" id="subscribe">
  <div id="capture-inner">
    <p class="role"><b>pianist</b></p>

    <!-- TODO (HASHIRA): 最終コピーに差し替え。ガイドライン: JTBDジョブ × 潜在ニーズ × 32ch以内 -->
    <p class="statement">Made up in the moment.<br>You don't need to know it&nbsp;— come to be moved.</p>
    <p class="offer">Join the mailing list</p>

    <!-- Kit form（fetch送信＝ページ遷移なし。Kit側の成功画面/広告は出ない）
         form ID = 9606457。変更時は action URL の数字を差し替える。
         fields[*] は初回送信時にKitが自動でCustom Field作成（手動作成不要）。
         Kit側の任意設定: Forms → Confirmation email を OFF にすると確認メール無しで即リスト入り。 -->
    <form class="form" id="kit-form" action="https://app.kit.com/forms/9606457/subscriptions" method="post">
      <div class="email-row">
        <input type="email" name="email_address" placeholder="email address" aria-label="email address" required>
      </div>
      <div class="lang-btns">
        <button type="button" class="lang-btn" onclick="submitWithLang('website EN')">subscribe in english</button>
        <button type="button" class="lang-btn" onclick="submitWithLang('website JP')">日本語で登録</button>
      </div>
      <input type="hidden" name="fields[language]" id="field-language" value="">
      <input type="hidden" name="fields[country]"  id="field-country"  value="">
      <input type="hidden" name="fields[source]"   id="field-source"   value="">
      <input type="hidden" name="tags[]"           id="field-tag"      value="">
      <p class="form-error" id="form-error"></p>
    </form>
    <p class="note">First word on new shows and recordings. Unsubscribe anytime.</p>
  </div>
</section>

<footer>
  <!-- TODO (HASHIRA): contact先メールアドレスを確定して mailto: に更新 -->
  <a href="contact.html">contact</a>
  <a href="https://www.instagram.com/takahiro_izumikawa/" target="_blank" rel="noopener">instagram&nbsp;↗&#xFE0E;</a>
  <a href="https://mubo.taka808.com/about/" target="_blank" rel="noopener">mubo&nbsp;↗&#xFE0E;</a>
</footer>

<script>
(function(){
  // 流入元タグ: ?src= → Kit fields[source]
  var src = new URLSearchParams(location.search).get('src');
  if(src) document.getElementById('field-source').value = src;

  // 国情報: ipapi.co silent fetch → Kit fields[country]
  fetch('https://ipapi.co/json/')
    .then(function(r){return r.json();})
    .then(function(d){
      document.getElementById('field-country').value = d.country_code || '';
    })
    .catch(function(){});
})();

// 言語ボタン押下: "website EN"/"website JP" → fields[language] → fetch送信（ページ遷移なし＝Kit広告画面が出ない）
function submitWithLang(lang){
  var form = document.getElementById('kit-form');
  var emailEl = form.querySelector('input[type="email"]');
  if(!emailEl.checkValidity()){emailEl.reportValidity();return;}

  document.getElementById('field-language').value = lang;
  // 言語タグID: Website EN=19430794 / Website JP=20632889（Kit Tag ID・正本 kit-email-operations.md）
  document.getElementById('field-tag').value = (lang === 'website JP') ? '20632889' : '19430794';
  var errEl = document.getElementById('form-error');
  errEl.textContent = '';

  var btns = form.querySelectorAll('.lang-btn');
  btns.forEach(function(b){b.disabled = true;});

  var body = new URLSearchParams(new FormData(form)).toString();
  fetch(form.action, {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded','Accept':'application/json'},
    body: body
  })
  .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json().catch(function(){return {};}); })
  .then(function(){ showSuccess(lang); })
  .catch(function(){
    btns.forEach(function(b){b.disabled = false;});
    errEl.textContent = (lang === 'website JP')
      ? '送信できませんでした。少し時間をおいて再度お試しください。'
      : 'Something went wrong. Please try again in a moment.';
  });
}

// 成功表示: capture 内容を言語別メッセージへ差し替え（LP内で完結）
function showSuccess(lang){
  var jp = (lang === 'website JP');
  var h = jp ? 'ありがとうございます' : 'thank you';
  var b = jp
    ? '確認のメールをお送りしました。受信箱をご確認ください。'
    : 'Check your email to confirm. New shows and recordings will come straight to you.';
  document.getElementById('capture-inner').innerHTML =
    '<p class="role"><b>' + h + '</b></p><p class="statement">' + b + '</p>';
}
</script>

</body>
</html>
